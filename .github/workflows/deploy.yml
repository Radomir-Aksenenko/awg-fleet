name: deploy

# Auto-deploy the controller to the fleet host on every push to main.
# Secrets are withheld from fork PRs, and only the maintainer can push to main,
# so the root deploy key is never exposed to untrusted code.

on:
  push:
    branches: [main]
    paths:
      - "awgfleet/**"
      - "pyproject.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 "root@${DEPLOY_HOST}" bash -s <<'REMOTE'
            set -e
            cd /opt/awg-fleet
            git pull --ff-only
            .venv/bin/pip install -q -e .
            systemctl restart awg-fleet
            systemctl restart awg-fleet-web 2>/dev/null || true
            sleep 3
            systemctl is-active awg-fleet
            echo "deployed $(git rev-parse --short HEAD)"
          REMOTE
