name: diagnose-panel-tls

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect panel TLS without secrets
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 "root@${DEPLOY_HOST}" 'bash -s' <<'REMOTE'
            set -euo pipefail
            echo '== panel service =='
            systemctl status awg-fleet-web --no-pager --lines=25 || true
            echo '== listening sockets =='
            ss -lntp | grep -E ':(80|443|8080)\b' || true
            echo '== TLS frontends =='
            for unit in caddy nginx apache2 traefik; do
              systemctl is-active "$unit" 2>/dev/null || true
            done
            echo '== local HTTPS response =='
            curl --resolve panel.megatntmega.ru:443:127.0.0.1 -k -sS -D - -o /dev/null \
              --max-time 10 https://panel.megatntmega.ru/ | sed -n '1,20p' || true
            echo '== certificate inventory =='
            for cert in /etc/letsencrypt/live/*/fullchain.pem; do
              [ -f "$cert" ] || continue
              printf '%s: ' "$cert"
              openssl x509 -in "$cert" -noout -subject -issuer -dates || true
            done
            echo '== Caddy validation =='
            if command -v caddy >/dev/null && [ -f /etc/caddy/Caddyfile ]; then
              caddy validate --config /etc/caddy/Caddyfile || true
            fi
          REMOTE
